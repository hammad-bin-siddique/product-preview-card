<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="product-card">
        <div class="product-img">
            <picture>
                <source media="(max-width: 768px)" srcset="./images/image-product-mobile.jpg">
                <img src="./images/image-product-desktop.jpg" alt="Product Image">
            </picture>
        </div>
        <div class="product-details">
            <p class="short-title">
                PERFUME
            </p>
            <h1 class="product-title">
                Gabrielle Essence Eau De Parfum
            </h1>
            <p class="product-description">
                A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the
                House of CHANEL.
            </p>
            <div class="price">
                <span class="current-price">$149.99</span>
                <span class="original-price">$169.99</span>
            </div>
            <button class="add-to-cart">
                <img src="./images/icon-cart.svg" alt="Cart Icon">
                Add to Cart
            </button>
        </div>

    </main>
    <footer class="main-footer">
        <p>Challenge by Frontend Mentor. Coded by Hammad Siddique </p>
    </footer>
</body>

</html>
